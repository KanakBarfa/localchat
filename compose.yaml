services:
  app:
    build: .
    image: chat-app-lite
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://chat:chat@db:5432/chatapp
      - MAX_PERSISTED_MESSAGES=500
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=chatapp
      - POSTGRES_USER=chat
      - POSTGRES_PASSWORD=chat
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat -d chatapp"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata: